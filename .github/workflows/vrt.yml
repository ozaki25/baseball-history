name: Visual Regression

# VRT（視覚回帰テスト）。描画は環境差に敏感なため、必ず固定された標準環境
# （Playwright 公式 Docker イメージ ＋ Noto CJK フォント）で実行する。
# ベースラインはこの環境で生成してリポジトリにコミットする（ローカル生成はコミットしない）。

on:
  pull_request:
    # 描画に影響し得る変更のみ対象（docs だけの PR では Docker ジョブを走らせない）
    paths:
      - "src/**"
      - "vite.config.ts"
      - "package.json"
      - "pnpm-lock.yaml"
      - ".github/workflows/vrt.yml"
  workflow_dispatch:
    inputs:
      update:
        description: "ベースラインを再生成してコミットする"
        type: boolean
        default: false

# 同一 PR/ブランチの古い実行はキャンセル
concurrency:
  group: vrt-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  vrt:
    runs-on: ubuntu-latest
    # dep の playwright と同一バージョンのイメージを使う（バンドルされたブラウザと一致させる）
    container:
      image: mcr.microsoft.com/playwright:v1.61.1-noble
    steps:
      - uses: actions/checkout@v4
        with:
          # PR 時はマージrefではなくブランチをチェックアウト（ベースライン push のため）
          ref: ${{ github.head_ref || github.ref_name }}

      - name: 日本語フォント（Noto CJK）を導入
        run: |
          apt-get update
          apt-get install -y --no-install-recommends fonts-noto-cjk
          rm -rf /var/lib/apt/lists/*

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: git 設定
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: 視覚回帰（比較／初回ブートストラップ／更新）
        env:
          UPDATE: ${{ github.event_name == 'workflow_dispatch' && inputs.update }}
          # fork PR では GITHUB_TOKEN が read-only になり baseline の push ができない。
          IS_FORK: ${{ github.event.pull_request.head.repo.fork }}
        run: |
          # baseline を push するパスで fork PR（read-only token）を明示的に弾く。
          # fork PR では push が必ず失敗するため、メンテナが権限のある環境で update=true を実行する運用とする。
          ensure_pushable() {
            if [ "$IS_FORK" = "true" ]; then
              echo "::error::fork からの PR では baseline の自動生成/コミットは行いません。メンテナが Visual Regression を update=true で手動実行してください。"
              exit 1
            fi
          }
          # 実行中に誰かがブランチを進めた場合（non-fast-forward）に一度だけ追従して push する。
          push_baseline() {
            git push || (git pull --rebase --autostash && git push)
          }

          existing=$(find src/tests/vrt/__screenshots__ -name '*.png' 2>/dev/null | wc -l)
          if [ "$UPDATE" = "true" ] || [ "$existing" -eq 0 ]; then
            echo "ベースラインを生成/更新します（標準環境）"
            pnpm test:visual:update
            git add src/tests/vrt/__screenshots__
            if git diff --cached --quiet; then
              echo "ベースラインに変更なし"
            else
              ensure_pushable
              git commit -m "chore(vrt): 視覚ベースラインを更新"
              push_baseline
            fi
            # 生成直後に同一環境で比較して自己検証（生成物が実際に一致することを担保）
            echo "生成したベースラインで自己検証します"
            pnpm test:visual
          else
            echo "コミット済みベースラインと比較します"
            if pnpm test:visual; then
              echo "視覚ベースラインと一致"
            else
              # 比較 fail の切り分け:
              #  - 新規ケース(未生成の toMatchScreenshot キー) → その baseline だけ自動生成・コミットして再検証
              #  - 既存 baseline との差分(視覚回帰) → 自動更新せず fail（人間が update=true で承認する）
              # 既知の限界: テストキーの「改名」は net-new として扱われ旧 baseline が孤児化する。改名時は
              #   update=true を手動実行すること（本 CI は改名を検知せず、孤児 baseline の自動承認もしない）。
              echo "比較に失敗。新規ケースか視覚回帰かを判定します"
              pnpm test:visual:update
              # 既存(追跡中)baseline への変更は破棄（回帰を自動で塗り潰さない）。残差=新規 untracked のみ。
              git checkout -- src/tests/vrt/__screenshots__
              if [ -z "$(git status --porcelain -- src/tests/vrt/__screenshots__)" ]; then
                echo "::error::既存 baseline との差分を検出（視覚回帰、または flaky の可能性）。意図した UI 変更なら Visual Regression を update=true で手動実行してください。"
                exit 1
              fi
              ensure_pushable
              git add src/tests/vrt/__screenshots__
              git commit -m "chore(vrt): 新規ケースの視覚ベースラインを追加"
              # push の前に最終比較する。既存ケースに回帰があればここで exit し、リモートを汚さない。
              echo "新規 baseline を含めて再検証します"
              pnpm test:visual
              push_baseline
            fi
          fi

      - name: 失敗時に actual/diff 画像をアーティファクト保存
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: vrt-diff
          path: .vitest-attachments/
          if-no-files-found: ignore
          retention-days: 14
