name: Ingest

on:
  push:
    paths: ["data/dates.json"]
  workflow_dispatch:
    inputs:
      force:
        description: "全件再取得する"
        type: boolean
        default: false
      year:
        description: "対象年 (YYYY, 空=全年)"
        type: string
        default: ""

permissions:
  contents: write

concurrency:
  group: ingest
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Ingest
        env:
          FORCE: ${{ github.event.inputs.force }}
          YEAR: ${{ github.event.inputs.year }}
        run: |
          ARGS=""
          if [ "$FORCE" = "true" ]; then ARGS="$ARGS --force"; fi
          if [ -n "$YEAR" ]; then ARGS="$ARGS --year $YEAR"; fi
          pnpm ingest $ARGS
      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/games.json data/ingest-report.json
          if git diff --staged --quiet; then
            echo "変更なし"
          else
            git commit -m "chore(data): 取り込み結果を更新"
            git push
          fi
